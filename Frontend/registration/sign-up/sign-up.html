<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign-up.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">    
    <title>Sign Up Page</title>
</head>
<body>
    <div class="container">
        <h3>Sign up to </h3>
        <h2>Unlock Your Potential</h2>
        
        <div class="feature">
            <div class="left">
                <p><i class="fa-solid fa-check tick"></i>Track your progress</p>
                <p><i class="fa-solid fa-check tick"></i>Easy learning</p>
            </div>
            <div class="right">
                <p><i class="fa-solid fa-check tick"></i>ads free</p>
                <p><i class="fa-solid fa-check tick"></i>code practice</p>
        </div>
        </div>
        <h6>....and much more!</h6>
       <form>
        <div class="form-group">
        <label for="email"></label>
        <input class="form-input" type="email" id="email" placeholder="Enter your email" required>
      
        <label for="password"></label>
        <input class="form-input" type="password" id="password" placeholder="password" required>
        <p class="hint">NOTE: Create a strong password</p>
        
        <label for="confirm-password"></label>
        <input class="form-input" type="password" id="confirm-password" placeholder="confirm password" required>
    
        <label for="first-name"></label>
        <input class="form-input" type="text" id="first-name" placeholder="Enter your first name" required>
        
        <label for="last-name"></label>
        <input class="form-input" type="text" id="last-name" placeholder="Enter your last name" required>
        </div>

           <label for="update"><input class="checkbox-group" type="checkbox" id="update"><span> Update me on new feature</span> </label>
            
    <button type="submit">Create Account</button>
</form>
    <div>
        <p class="login-link"> Already have an account?<a href="../registration/login(sign-in)/login.html">Login</a></p>
    </div>  
     <div class="divider">
        <hr>
        <span>OR</span>
        <hr>
    </div>
   <div class="social-buttons">
        <a href="https://www.google.com" class="social-btn google">
          <i class="fa-brands fa-google"></i>
          <span>Google</span>
        </a>
        <a href="https://www.github.com" class="social-btn github">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>
        <a href="https://www.facebook.com" class="social-btn facebook">
          <i class="fa-brands fa-facebook"></i>
          <span>Facebook</span>
        </a>
      </div>
</body>
</html>
