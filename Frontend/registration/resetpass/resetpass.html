<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="resetpass.css" />
</head>
<body>
  <div class="container">
    <p class="eyebrow">Security</p>
    <h1>Set a new password</h1>
    <p class="subtitle">Choose a strong password and confirm it below.</p>

    <form class="reset-form" action="../login(sign-in)/login.html" method="get">
      <label for="new-password">New Password</label>
      <input id="new-password" type="password" placeholder="Enter new password" required />

      <label for="confirm-password">Confirm Password</label>
      <input id="confirm-password" type="password" placeholder="Confirm new password" required />

      <button type="submit">Reset Password</button>
    </form>

   <a class="back-link" href="../login(sign-in)/login.html">Back to Login</a>
  </div>
</body>
</html>
