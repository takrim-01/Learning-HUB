<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning-HUB</title>
    <link rel="stylesheet" href="Frontend/css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">

            <a href="#" class="navbar-brand">
                <span class="navbar-logo">Learning-HUB</span>
            </a>

            <button class="navbar-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navMenu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="navbar-menu" id="navMenu">
                <li><a href="#" class="navbar-link">Home</a></li>
                <li><a href="#" class="navbar-link">Courses</a></li>
                <li><a href="#" class="navbar-link">About</a></li>
                <li><a href="#" class="navbar-cta">Dive In</a></li>
            </ul>

        </div>
    </nav>

    <script>
        const toggle = document.getElementById('navToggle');
        const menu = document.getElementById('navMenu');
        toggle.addEventListener('click', () => {
            const isOpen = menu.classList.toggle('active');
            toggle.classList.toggle('active');
            toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
    </script>

</body>
</html>
