<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <main class="container">
    <section class="login-start">
      <div class="brand-block">
        <p class="heading">Knowledge Cafe</p>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to continue your learning journey.</p>
      </div>

      <form class="login-form">
        <label class="field-label" for="email">Email address</label>
        <input id="email" type="email" placeholder="Enter your email" required />

        <label class="field-label" for="password">Password</label>
        <div class="password-row">
          <input id="password" type="password" placeholder="Enter your password" required />
          <button type="button" class="icon-btn" aria-label="Show password">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <div class="check-box">
          <label class="check-row">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="../forgetpassword/fpass.html">Forgot password?</a>
        </div>

        <button class="submit-btn" type="submit">Sign in</button>
      </form>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="social-buttons">
        <a href="https://www.google.com" class="social-btn google">
          <i class="fa-brands fa-google"></i>
          <span>Google</span>
        </a>
        <a href="https://www.github.com" class="social-btn github">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>
        <a href="https://www.facebook.com" class="social-btn facebook">
          <i class="fa-brands fa-facebook"></i>
          <span>Facebook</span>
        </a>
      </div>

      <p class="signup-link">
        New here? <a href="../registration/sign-up.html">Create an account</a>
      </p>
    </section>
  </main>
</body>
</html>
